name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Build with Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: master
          
      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: DietApp-APK
          path: bin/*.apk
