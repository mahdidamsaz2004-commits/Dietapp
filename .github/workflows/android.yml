name: Build Diet App APK
on: [push]

env:
  # این خط اخطار Node.js گیت‌هاب را برطرف می‌کند
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter (Required for Flet)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flet

      - name: Build APK with Flet
        run: flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DietMaster-APK
          path: build/apk/**/*.apk
